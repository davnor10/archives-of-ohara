name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            name: linux
          - os: windows-latest
            script: build:win
            name: windows
          - os: macos-latest
            script: build:mac
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: archives-of-ohara/package-lock.json

      - name: Install dependencies
        working-directory: archives-of-ohara
        run: npm ci

      - name: Build
        working-directory: archives-of-ohara
        run: npm run ${{ matrix.script }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./archives-of-ohara/package.json').version")
          TAG="v${VERSION}"

          # Create the release if it doesn't exist yet; ignore the error if it does
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Archives of Ohara $TAG" \
            --notes "Release $TAG" \
            2>/dev/null || true

          # Upload this platform's files (--clobber overwrites if re-running)
          shopt -s nullglob
          FILES=(
            archives-of-ohara/dist/*.AppImage
            archives-of-ohara/dist/*.deb
            archives-of-ohara/dist/*.exe
            archives-of-ohara/dist/*.dmg
            archives-of-ohara/dist/*.zip
          )
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$TAG" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
