name: Build Installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            name: linux
          - os: windows-latest
            script: build:win
            name: windows
          - os: macos-latest
            script: build:mac
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: archives-of-ohara/package-lock.json

      - name: Install dependencies
        working-directory: archives-of-ohara
        run: npm ci

      - name: Build and Publish
        working-directory: archives-of-ohara
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.script }} -- --publish always
